alias "+ffw50" "demo_timescale 50"
alias "-ffw50" "demo_timescale 1"
alias "+slomo" "demo_timescale .5"
alias "-slomo" "demo_timescale 1"

bind pgup "radio" // auto director
bind home "toggle spec_show_xray" // x-ray
bind space "demo_togglepause" // toggle pause demo
bind del "demoui" // opens demoui
bind uparrow "+ffw50" // 50x speed
bind downarrow "+slomo" // 0.5x speed
bind leftarrow "demo_gototick -320 relative" // skip back 5 seconds
bind rightarrow "demo_gototick 320 relative" // skip forward 5 seconds

cl_show_observer_crosshair "2"
