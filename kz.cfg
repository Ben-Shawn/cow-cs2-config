sensitivity 5
fps_max 999
hud_showtargetid 1

-cl_show_team_equipment

alias +djump "+jump;+duck;-forward;-back;"
alias -djump "-jump;-duck;"
bind ALT +djump

alias djump "bind space +djump"
alias CJ "bind mwheelup +duck"

alias link "echo pastebin.com/zwY1imeH"

bind mouse1 kz_checkpoint
bind mouse2 kz_teleport
bind mouse3 kz_pause
bind mouse5 kz_restart
bind / sm_start

bind kp_ins "say !menu"
bind kp_del sm_stopsound
bind kp_end "say !top"
bind kp_downarrow "say !maptop"
bind kp_PgDn "say !rank"
bind kp_leftarrow "say !nominate"
bind kp_5 sm_rtv
bind kp_rightarrow "say !spec"
bind kp_Home "say !stop"
bind kp_uparrow "say !goto"

